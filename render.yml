## YAservices:
  - type: web
    name: automovil-service
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/automovil-service-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_DATASOURCE_URL
        value: your-render-postgres-url
      - key: SPRING_DATASOURCE_USERNAME
        value: your-username
      - key: SPRING_DATASOURCE_PASSWORD
        value: your-passwordML Template.
---
